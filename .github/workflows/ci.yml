name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          # Tests use in-memory fallbacks — no real keys needed in CI
          ANTHROPIC_API_KEY: ""
          NEXT_PUBLIC_SUPABASE_URL: ""
          SUPABASE_SERVICE_ROLE_KEY: ""
          RESEND_API_KEY: ""
